version: 2

builds:
  - main: ./cmd/obacht
    binary: obacht
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

brews:
  - repository:
      owner: foomo
      name: homebrew-tap
    homepage: https://github.com/foomo/obacht
    description: Security configuration scanner for developer environments
    license: MIT
