rules:
  - id: SHL001
    title: Shell history file has weak permissions
    severity: warn
    category: shell
    description: |
      Shell history files may contain sensitive commands including
      passwords, tokens, and API keys typed on the command line.
      They should only be readable by the owner.
    remediation: "Run: chmod 600 ~/.bash_history ~/.zsh_history"
    policy: |
      findings contains f if {
        input.history_file_mode != ""
        input.history_file_mode != "0600"
        f := {
          "rule_id": "SHL001",
          "evidence": sprintf("History file %s has mode %s (expected 0600)", [input.history_file, input.history_file_mode]),
        }
      }
