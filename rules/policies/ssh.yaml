rules:
  - id: SSH001
    title: SSH private key has weak permissions
    severity: high
    category: ssh
    description: |
      SSH private keys should be readable only by the owner.
      Keys with permissions wider than 0600 can be read by
      other users on the system.
    remediation: "Run: chmod 600 ~/.ssh/id_*"
    policy: |
      findings contains f if {
        key := input.keys[_]
        key.mode != "0600"
        f := {
          "rule_id": "SSH001",
          "evidence": sprintf("Key %s has mode %s (expected 0600)", [key.path, key.mode]),
        }
      }
  - id: SSH002
    title: SSH directory has weak permissions
    severity: high
    category: ssh
    description: |
      The ~/.ssh directory should only be accessible by the owner.
      Permissions wider than 0700 may allow other users to read
      or modify SSH configuration and keys.
    remediation: "Run: chmod 700 ~/.ssh"
    policy: |
      findings contains f if {
        input.directory_exists
        input.directory_mode != "0700"
        f := {
          "rule_id": "SSH002",
          "evidence": sprintf("~/.ssh has mode %s (expected 0700)", [input.directory_mode]),
        }
      }
  - id: SSH003
    title: SSH StrictHostKeyChecking is disabled
    severity: high
    category: ssh
    description: |
      Setting StrictHostKeyChecking to 'no' in SSH config disables
      host key verification, making connections vulnerable to
      man-in-the-middle attacks.
    remediation: "Remove or change 'StrictHostKeyChecking no' in ~/.ssh/config"
    policy: |
      findings contains f if {
        input.config_exists
        input.strict_host_key_checking_disabled
        f := {
          "rule_id": "SSH003",
          "evidence": "SSH config has StrictHostKeyChecking set to 'no'",
        }
      }
  - id: SSH004
    title: SSH agent forwarding is enabled globally
    severity: warn
    category: ssh
    description: |
      Enabling ForwardAgent globally (under Host *) allows any remote
      server to use your local SSH agent. A compromised server could
      use your forwarded keys to access other systems. Only enable
      agent forwarding for specific trusted hosts.
    remediation: "Remove 'ForwardAgent yes' from Host * section in ~/.ssh/config and add it only to specific trusted hosts"
    policy: |
      findings contains f if {
        input.config_exists
        input.forward_agent_global
        f := {
          "rule_id": "SSH004",
          "evidence": "SSH agent forwarding is enabled globally (Host *)",
        }
      }
