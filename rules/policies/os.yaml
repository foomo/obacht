rules:
  - id: OS001
    title: System Integrity Protection is disabled
    severity: critical
    category: os
    description: |
      System Integrity Protection (SIP) prevents modification of protected
      system files and directories. Disabling SIP significantly weakens
      macOS security.
    remediation: "Boot into Recovery Mode and run: csrutil enable"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.sip_enabled
        f := {"rule_id": "OS001", "evidence": "System Integrity Protection is disabled"}
      }
  - id: OS002
    title: FileVault disk encryption is disabled
    severity: critical
    category: os
    description: |
      FileVault provides full-disk encryption protecting data at rest.
      Without it, data on the disk can be accessed by removing or
      mounting the drive externally.
    remediation: "Enable FileVault in System Settings > Privacy & Security > FileVault"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.filevault_enabled
        f := {"rule_id": "OS002", "evidence": "FileVault disk encryption is disabled"}
      }
  - id: OS003
    title: Application Firewall is disabled
    severity: high
    category: os
    description: |
      The application firewall controls incoming network connections
      on a per-application basis.
    remediation: "Run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setglobalstate on"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.firewall_enabled
        f := {"rule_id": "OS003", "evidence": "Application Firewall is disabled"}
      }
  - id: OS004
    title: Stealth Mode is disabled
    severity: high
    category: os
    description: |
      Stealth Mode prevents the Mac from responding to probing requests
      such as ICMP ping, making it harder to discover on the network.
    remediation: "Run: sudo /usr/libexec/ApplicationFirewall/socketfilterfw --setstealthmode on"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.stealth_mode_enabled
        f := {"rule_id": "OS004", "evidence": "Stealth Mode is disabled"}
      }
  - id: OS005
    title: Gatekeeper is disabled
    severity: critical
    category: os
    description: |
      Gatekeeper ensures only trusted software runs by verifying apps
      are signed by an identified developer or distributed via the
      App Store.
    remediation: "Run: sudo spctl --master-enable"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.gatekeeper_enabled
        f := {"rule_id": "OS005", "evidence": "Gatekeeper is disabled"}
      }
  - id: OS006
    title: Automatic login is enabled
    severity: high
    category: os
    description: |
      Automatic login allows anyone with physical access to use the
      Mac without authentication.
    remediation: "Disable in System Settings > Users & Groups > Automatic login"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.auto_login_disabled
        f := {"rule_id": "OS006", "evidence": "Automatic login is enabled"}
      }
  - id: OS007
    title: Guest account is enabled
    severity: high
    category: os
    description: |
      The guest account allows unauthenticated access to the Mac
      and can be used as an attack vector.
    remediation: "Disable in System Settings > Users & Groups > Guest User"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.guest_account_disabled
        f := {"rule_id": "OS007", "evidence": "Guest account is enabled"}
      }
  - id: OS008
    title: Screen lock timeout exceeds 5 minutes
    severity: warn
    category: os
    description: |
      A long screen lock timeout leaves the Mac accessible when
      unattended. The timeout should be 300 seconds (5 minutes)
      or less.
    remediation: "Set in System Settings > Lock Screen > Require password after screen saver begins"
    policy: |
      findings contains f if {
        input.os == "darwin"
        input.screen_lock_timeout_seconds > 300
        f := {
          "rule_id": "OS008",
          "evidence": sprintf("Screen lock timeout is %d seconds (maximum 300)", [input.screen_lock_timeout_seconds]),
        }
      }
  - id: OS009
    title: Automatic OS updates are disabled
    severity: high
    category: os
    description: |
      Automatic OS updates ensure critical security patches are
      applied promptly.
    remediation: "Run: softwareupdate --schedule on"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.os_auto_update_enabled
        f := {"rule_id": "OS009", "evidence": "Automatic OS updates are disabled"}
      }
  - id: OS010
    title: Automatic App Store updates are disabled
    severity: warn
    category: os
    description: |
      Automatic App Store updates keep applications patched against
      known vulnerabilities.
    remediation: "Enable in System Settings > General > Software Update > Automatic Updates"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.app_auto_update_enabled
        f := {"rule_id": "OS010", "evidence": "Automatic App Store updates are disabled"}
      }
  - id: OS011
    title: Rapid Security Responses are disabled
    severity: high
    category: os
    description: |
      Rapid Security Responses deliver urgent security fixes between
      regular OS updates.
    remediation: "Enable in System Settings > General > Software Update > Automatic Updates"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.rsr_enabled
        f := {"rule_id": "OS011", "evidence": "Rapid Security Responses are disabled"}
      }
  - id: OS013
    title: Screen Sharing is enabled
    severity: high
    category: os
    description: |
      Screen Sharing allows remote access to the Mac desktop and
      should be disabled unless actively needed.
    remediation: "Run: sudo launchctl disable system/com.apple.screensharing"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.screen_sharing_disabled
        f := {"rule_id": "OS013", "evidence": "Screen Sharing is enabled"}
      }
  - id: OS014
    title: Internet Sharing is enabled
    severity: high
    category: os
    description: |
      Internet Sharing turns the Mac into a network gateway, which
      can expose internal networks.
    remediation: "Disable in System Settings > General > Sharing > Internet Sharing"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.internet_sharing_disabled
        f := {"rule_id": "OS014", "evidence": "Internet Sharing is enabled"}
      }
  - id: OS015
    title: Printer Sharing is enabled
    severity: warn
    category: os
    description: |
      Printer Sharing exposes the Mac on the network and should be
      disabled unless required.
    remediation: "Disable in System Settings > General > Sharing > Printer Sharing"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.printer_sharing_disabled
        f := {"rule_id": "OS015", "evidence": "Printer Sharing is enabled"}
      }
  - id: OS016
    title: Remote Apple Events are enabled
    severity: high
    category: os
    description: |
      Remote Apple Events allow other computers to send Apple Events
      to this Mac, which can be used to execute commands remotely.
    remediation: "Disable in System Settings > General > Sharing > Remote Apple Events"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.remote_apple_events_disabled
        f := {"rule_id": "OS016", "evidence": "Remote Apple Events are enabled"}
      }
  - id: OS017
    title: AirDrop is set to Everyone
    severity: high
    category: os
    description: |
      Setting AirDrop to Everyone allows any nearby device to send
      files, increasing the risk of social engineering attacks.
    remediation: "Set AirDrop to Contacts Only or Off in Finder > AirDrop"
    policy: |
      findings contains f if {
        input.os == "darwin"
        input.airdrop_setting == "everyone"
        f := {"rule_id": "OS017", "evidence": "AirDrop is set to Everyone"}
      }
  - id: OS018
    title: No EDR agent deployed
    severity: critical
    category: os
    description: |
      An Endpoint Detection & Response agent provides real-time
      threat monitoring and incident response capabilities.
    remediation: "Install the organization-approved EDR agent"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.edr_deployed
        f := {"rule_id": "OS018", "evidence": "No Endpoint Detection & Response agent deployed"}
      }
  - id: OS019
    title: Legacy kernel extensions are not blocked
    severity: high
    category: os
    description: |
      Legacy kernel extensions (kexts) run with full kernel privileges
      and should be replaced with System Extensions.
    remediation: "Configure system extension policy via MDM or System Settings"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.legacy_kexts_blocked
        f := {"rule_id": "OS019", "evidence": "Legacy kernel extensions (kexts) are not blocked"}
      }
  - id: OS020
    title: Device is not enrolled in MDM
    severity: high
    category: os
    description: |
      MDM enrollment enables centralized security policy enforcement,
      remote wipe, and compliance monitoring.
    remediation: "Enroll the device via your organization's MDM solution"
    policy: |
      findings contains f if {
        input.os == "darwin"
        not input.mdm_enrolled
        f := {"rule_id": "OS020", "evidence": "Device is not enrolled in MDM"}
      }
  - id: OS021
    title: Rosetta 2 is installed
    severity: info
    category: os
    description: |
      Rosetta 2 enables running Intel binaries on Apple Silicon. If
      no longer needed, removing it reduces attack surface.
    remediation: "Remove Rosetta 2 if no Intel-only applications are required"
    policy: |
      findings contains f if {
        input.os == "darwin"
        input.rosetta_installed
        f := {"rule_id": "OS021", "evidence": "Rosetta 2 is installed; remove if no longer needed to reduce attack surface"}
      }
  - id: OS022
    title: AirDrop is not fully disabled
    severity: info
    category: os
    description: |
      For high-risk roles, consider disabling AirDrop entirely
      rather than using Contacts Only.
    remediation: "Set AirDrop to Off in Finder > AirDrop"
    policy: |
      findings contains f if {
        input.os == "darwin"
        input.airdrop_setting != "off"
        input.airdrop_setting != "everyone"
        f := {"rule_id": "OS022", "evidence": sprintf("AirDrop is set to %s; consider disabling entirely", [input.airdrop_setting])}
      }
