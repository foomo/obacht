rules:
  - id: PTH001
    title: World-writable directory in PATH
    severity: high
    category: path
    description: |
      A world-writable directory in your PATH allows any user on the
      system to place malicious executables that hijack commands.
      Standard permissions like 0755 are accepted; only directories
      with the others-write bit set (e.g., 0777) are flagged.
    remediation: "Remove the world-writable directory from PATH or tighten its permissions (e.g., chmod 0755)"
    policy: |
      findings contains f if {
        dir := input.dirs[_]
        dir.exists
        dir.world_writable
        f := {
          "rule_id": "PTH001",
          "evidence": sprintf("World-writable directory in PATH: %s (mode %s)", [dir.path, dir.mode]),
        }
      }
  - id: PTH002
    title: Relative path entry in PATH
    severity: warn
    category: path
    description: |
      A relative path in PATH (e.g., '.') causes command resolution
      to depend on the current working directory. An attacker could
      exploit this by placing malicious executables in commonly
      visited directories.
    remediation: "Remove relative paths from PATH and use absolute paths instead"
    policy: |
      findings contains f if {
        dir := input.dirs[_]
        dir.is_relative
        f := {
          "rule_id": "PTH002",
          "evidence": sprintf("Relative path in PATH: %s", [dir.path]),
        }
      }
