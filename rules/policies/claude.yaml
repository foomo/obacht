  - id: CLD011
    title: Claude Code DISABLE_LOGOUT_COMMAND is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_LOGOUT_COMMAND="1" hides the /logout command. Pairs
      with DISABLE_LOGIN_COMMAND so authentication state is managed
      out-of-band rather than from inside a transcript.
    remediation: 'Set "env": {"DISABLE_LOGOUT_COMMAND": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_logout_command != "1"
        f := {
          "rule_id": "CLD011",
          "evidence": sprintf("env.DISABLE_LOGOUT_COMMAND is %s, expected \"1\"", [input.env_disable_logout_command]),
