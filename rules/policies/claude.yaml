rules:
  - id: CLD001
    title: Global gitignore does not exclude Claude Code local settings
    severity: warn
    category: claude
    description: |
      Claude Code stores user-specific settings in .claude/settings.local.json
      which may contain personal configuration. A global gitignore entry for
      **/.claude/settings.local.json prevents accidental commits.
    remediation: "Run: echo '**/.claude/settings.local.json' >> ~/.gitignore_global && git config --global core.excludesfile ~/.gitignore_global"
    policy: |
      findings contains f if {
        input.installed
        not input.gitignore_excludes_settings
        f := {
          "rule_id": "CLD001",
          "evidence": "Global gitignore does not exclude **/.claude/settings.local.json",
        }
      }
  - id: CLD002
    title: Claude Code autoCompactEnabled is not disabled
    severity: warn
    category: claude
    description: |
      Claude Code's auto-compact feature silently rewrites conversation
      context when token budgets are reached, which can drop critical
      details. Disabling it gives the user explicit control over when
      compaction happens.
    remediation: 'Set "autoCompactEnabled": false in ~/.claude.json (or $CLAUDE_CONFIG_DIR/.claude.json)'
    policy: |
      findings contains f if {
        input.installed
        input.config_present
        input.auto_compact_enabled != "false"
        f := {
          "rule_id": "CLD002",
          "evidence": sprintf("autoCompactEnabled is %s, expected false", [input.auto_compact_enabled]),
        }
      }
  - id: CLD003
    title: Claude Code prStatusFooterEnabled is not disabled
    severity: warn
    category: claude
    description: |
      The PR status footer makes outbound calls to GitHub to display PR
      status in the CLI footer. Disabling it reduces network chatter and
      avoids leaking working-directory metadata to remote services when
      not needed.
    remediation: 'Set "prStatusFooterEnabled": false in ~/.claude.json (or $CLAUDE_CONFIG_DIR/.claude.json)'
    policy: |
      findings contains f if {
        input.installed
        input.config_present
        input.pr_status_footer_enabled != "false"
        f := {
          "rule_id": "CLD003",
          "evidence": sprintf("prStatusFooterEnabled is %s, expected false", [input.pr_status_footer_enabled]),
        }
      }
  - id: CLD004
    title: Claude Code claudeInChromeDefaultEnabled is not disabled
    severity: warn
    category: claude
    description: |
      The Claude-in-Chrome integration injects Claude into the default
      browser. Disabling the default-enable flag prevents unintended
      browser instrumentation and keeps Claude Code scoped to the
      terminal until explicitly opted in.
    remediation: 'Set "claudeInChromeDefaultEnabled": false in ~/.claude.json (or $CLAUDE_CONFIG_DIR/.claude.json)'
    policy: |
      findings contains f if {
        input.installed
        input.config_present
        input.claude_in_chrome_default_enabled != "false"
        f := {
          "rule_id": "CLD004",
          "evidence": sprintf("claudeInChromeDefaultEnabled is %s, expected false", [input.claude_in_chrome_default_enabled]),
        }
      }
  - id: CLD005
    title: Claude Code sandbox.failIfUnavailable is not enabled
    severity: high
    category: claude
    description: |
      When sandbox.failIfUnavailable is false (or unset), Claude Code
      will silently run without the platform sandbox if it cannot be
      initialized, removing a key isolation boundary. Setting it to
      true forces Claude Code to fail closed when the sandbox is
      unavailable, ensuring tool execution always runs under the
      expected confinement.
    remediation: 'Set "sandbox": {"failIfUnavailable": true} in ~/.claude.json (or $CLAUDE_CONFIG_DIR/.claude.json)'
    policy: |
      findings contains f if {
        input.installed
        input.config_present
        input.sandbox_fail_if_unavailable != "true"
        f := {
          "rule_id": "CLD005",
          "evidence": sprintf("sandbox.failIfUnavailable is %s, expected true", [input.sandbox_fail_if_unavailable]),
        }
      }
  - id: CLD006
    title: Claude Code DISABLE_COMPACT is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_COMPACT="1" turns off the manual /compact command, which
      otherwise rewrites conversation history in place. Setting it
      removes a class of silent context mutations that can drop details
      the user expects to keep.
    remediation: 'Set "env": {"DISABLE_COMPACT": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_compact != "1"
        f := {
          "rule_id": "CLD006",
          "evidence": sprintf("env.DISABLE_COMPACT is %s, expected \"1\"", [input.env_disable_compact]),
        }
      }
  - id: CLD007
    title: Claude Code DISABLE_TELEMETRY is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_TELEMETRY="1" opts out of anonymized usage telemetry that
      Claude Code otherwise sends to Anthropic. Disabling it keeps
      command and tool-usage metadata local.
    remediation: 'Set "env": {"DISABLE_TELEMETRY": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_telemetry != "1"
        f := {
          "rule_id": "CLD007",
          "evidence": sprintf("env.DISABLE_TELEMETRY is %s, expected \"1\"", [input.env_disable_telemetry]),
        }
      }
  - id: CLD008
    title: Claude Code DISABLE_BUG_COMMAND is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_BUG_COMMAND="1" hides the /bug command, which submits
      bug reports (potentially including transcript context) to
      Anthropic. Disabling it prevents accidental upload of working
      session content.
    remediation: 'Set "env": {"DISABLE_BUG_COMMAND": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_bug_command != "1"
        f := {
          "rule_id": "CLD008",
          "evidence": sprintf("env.DISABLE_BUG_COMMAND is %s, expected \"1\"", [input.env_disable_bug_command]),
        }
      }
  - id: CLD009
    title: Claude Code DISABLE_AUTO_COMPACT is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_AUTO_COMPACT="1" disables automatic conversation
      compaction triggered when context fills up. Without it, Claude
      Code may silently rewrite the conversation, dropping details
      the user assumed were preserved.
    remediation: 'Set "env": {"DISABLE_AUTO_COMPACT": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_auto_compact != "1"
        f := {
          "rule_id": "CLD009",
          "evidence": sprintf("env.DISABLE_AUTO_COMPACT is %s, expected \"1\"", [input.env_disable_auto_compact]),
        }
      }
  - id: CLD010
    title: Claude Code DISABLE_LOGIN_COMMAND is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_LOGIN_COMMAND="1" hides the /login command. In
      multi-account or shared environments this prevents accidental
      account switching from inside an active session.
    remediation: 'Set "env": {"DISABLE_LOGIN_COMMAND": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_login_command != "1"
        f := {
          "rule_id": "CLD010",
          "evidence": sprintf("env.DISABLE_LOGIN_COMMAND is %s, expected \"1\"", [input.env_disable_login_command]),
        }
