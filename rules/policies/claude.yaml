  - id: CLD013
    title: Claude Code DISABLE_UPGRADE_COMMAND is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_UPGRADE_COMMAND="1" hides the in-app upgrade command so
      Claude Code is upgraded only via the system package manager.
      This keeps install state managed by the platform's normal
      software pipeline.
    remediation: 'Set "env": {"DISABLE_UPGRADE_COMMAND": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_upgrade_command != "1"
        f := {
          "rule_id": "CLD013",
          "evidence": sprintf("env.DISABLE_UPGRADE_COMMAND is %s, expected \"1\"", [input.env_disable_upgrade_command]),
        }
      }
  - id: CLD014
