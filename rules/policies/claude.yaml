  - id: CLD012
    title: Claude Code DISABLE_ERROR_REPORTING is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_ERROR_REPORTING="1" stops Claude Code from uploading
      error stack traces (which can contain file paths, command
      arguments, and other working-directory metadata) to Anthropic.
    remediation: 'Set "env": {"DISABLE_ERROR_REPORTING": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_error_reporting != "1"
        f := {
          "rule_id": "CLD012",
          "evidence": sprintf("env.DISABLE_ERROR_REPORTING is %s, expected \"1\"", [input.env_disable_error_reporting]),
        }
