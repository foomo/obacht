  - id: CLD016
    title: Claude Code CLAUDE_CODE_DISABLE_FAST_MODE is not set in settings.json
    severity: warn
    category: claude
    description: |
      CLAUDE_CODE_DISABLE_FAST_MODE="1" turns off the /fast toggle so
      the model in use cannot be flipped mid-session. Keeps the
      runtime model deterministic for audit and reproducibility.
    remediation: 'Set "env": {"CLAUDE_CODE_DISABLE_FAST_MODE": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_claude_code_disable_fast_mode != "1"
        f := {
          "rule_id": "CLD016",
          "evidence": sprintf("env.CLAUDE_CODE_DISABLE_FAST_MODE is %s, expected \"1\"", [input.env_claude_code_disable_fast_mode]),
        }
      }
  - id: CLD017
    title: Claude Code DISABLE_INSTALL_GITHUB_APP_COMMAND is not set in settings.json
    severity: warn
    category: claude
    description: |
      DISABLE_INSTALL_GITHUB_APP_COMMAND="1" prevents Claude Code from
      installing GitHub Apps from inside a session. GitHub App
      installation grants persistent organization-level permissions
      and should be performed deliberately, not from a transcript.
    remediation: 'Set "env": {"DISABLE_INSTALL_GITHUB_APP_COMMAND": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_disable_install_github_app_command != "1"
        f := {
          "rule_id": "CLD017",
          "evidence": sprintf("env.DISABLE_INSTALL_GITHUB_APP_COMMAND is %s, expected \"1\"", [input.env_disable_install_github_app_command]),
        }
      }
  - id: CLD018
    title: Claude Code CLAUDE_CODE_DISABLE_CRON is not set in settings.json
    severity: warn
    category: claude
    description: |
      CLAUDE_CODE_DISABLE_CRON="1" turns off scheduled/cron-style
      autonomous task execution. Removes a class of background
      activity that can run without the user being attached to the
      session.
    remediation: 'Set "env": {"CLAUDE_CODE_DISABLE_CRON": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_claude_code_disable_cron != "1"
        f := {
          "rule_id": "CLD018",
          "evidence": sprintf("env.CLAUDE_CODE_DISABLE_CRON is %s, expected \"1\"", [input.env_claude_code_disable_cron]),
        }
      }
  - id: CLD019
    title: Claude Code CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY is not set in settings.json
    severity: warn
    category: claude
    description: |
      CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY="1" suppresses periodic
      in-session feedback prompts. Removes an interactive surface
      that can interrupt a working session.
    remediation: 'Set "env": {"CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_claude_code_disable_feedback_survey != "1"
        f := {
          "rule_id": "CLD019",
          "evidence": sprintf("env.CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY is %s, expected \"1\"", [input.env_claude_code_disable_feedback_survey]),
        }
      }
  - id: CLD020
    title: Claude Code CLAUDE_CODE_DISABLE_FILE_CHECKPOINTING is not set in settings.json
    severity: warn
    category: claude
    description: |
      CLAUDE_CODE_DISABLE_FILE_CHECKPOINTING="1" disables the
      file-checkpointing feature, which writes snapshots of working
      files to local state. Disabling it reduces disk/IO usage and
      removes a source of stale snapshots.
    remediation: 'Set "env": {"CLAUDE_CODE_DISABLE_FILE_CHECKPOINTING": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_claude_code_disable_file_checkpointing != "1"
        f := {
          "rule_id": "CLD020",
          "evidence": sprintf("env.CLAUDE_CODE_DISABLE_FILE_CHECKPOINTING is %s, expected \"1\"", [input.env_claude_code_disable_file_checkpointing]),
        }
      }
  - id: CLD021
    title: Claude Code CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS is not set in settings.json
    severity: warn
    category: claude
    description: |
      CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS="1" opts out of
      experimental beta features. Keeps the runtime to documented
      stable behaviour, which is preferable for reproducibility and
      auditability.
    remediation: 'Set "env": {"CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_claude_code_disable_experimental_betas != "1"
        f := {
          "rule_id": "CLD021",
          "evidence": sprintf("env.CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS is %s, expected \"1\"", [input.env_claude_code_disable_experimental_betas]),
        }
      }
  - id: CLD022
    title: Claude Code FORCE_AUTOUPDATE_PLUGINS is not set in settings.json
    severity: warn
    category: claude
    description: |
      FORCE_AUTOUPDATE_PLUGINS="1" forces Claude Code plugins to
      auto-update so installed plugins do not drift behind upstream
      fixes. Keeps the plugin set on the latest published version.
    remediation: 'Set "env": {"FORCE_AUTOUPDATE_PLUGINS": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_force_autoupdate_plugins != "1"
        f := {
          "rule_id": "CLD022",
          "evidence": sprintf("env.FORCE_AUTOUPDATE_PLUGINS is %s, expected \"1\"", [input.env_force_autoupdate_plugins]),
        }
      }
  - id: CLD023
    title: Claude Code IS_DEMO is not set in settings.json
    severity: warn
    category: claude
    description: |
      IS_DEMO="1" enables demo-mode affordances in Claude Code. This
      rule reflects a deliberate user-policy choice to run in demo
      mode; remove the rule (or override the env value) if your
      environment should not run in demo mode.
    remediation: 'Set "env": {"IS_DEMO": "1"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.env_is_demo != "1"
        f := {
          "rule_id": "CLD023",
          "evidence": sprintf("env.IS_DEMO is %s, expected \"1\"", [input.env_is_demo]),
        }
      }
  - id: CLD024
    title: Claude Code disableAutoMode is not set to "disable" in settings.json
    severity: warn
    category: claude
    description: |
      disableAutoMode="disable" prevents Claude Code from automatically
      switching into autonomous modes that take actions without
      explicit per-turn confirmation. Forces the user to opt in to
      autonomous behaviour each time.
    remediation: 'Set "disableAutoMode": "disable" in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.settings_disable_auto_mode != "disable"
        f := {
          "rule_id": "CLD024",
          "evidence": sprintf("disableAutoMode is %s, expected \"disable\"", [input.settings_disable_auto_mode]),
        }
      }
  - id: CLD025
    title: Claude Code disableDeepLinkRegistration is not set to "disable" in settings.json
    severity: warn
    category: claude
    description: |
      disableDeepLinkRegistration="disable" stops Claude Code from
      registering itself as the handler for claude:// deep links.
      Removes a class of inbound URL handlers that other applications
      could otherwise invoke.
    remediation: 'Set "disableDeepLinkRegistration": "disable" in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.settings_disable_deep_link_registration != "disable"
        f := {
          "rule_id": "CLD025",
          "evidence": sprintf("disableDeepLinkRegistration is %s, expected \"disable\"", [input.settings_disable_deep_link_registration]),
        }
      }
  - id: CLD026
    title: Claude Code attribution.commit and attribution.pr are not empty in settings.json
    severity: warn
    category: claude
    description: |
      Claude Code appends an attribution trailer to commit messages
      and PR bodies it generates. Setting attribution.commit and
      attribution.pr to empty strings removes these trailers, keeping
      authored artefacts free of tool-specific markers and avoiding
      leaking that Claude Code was used.
    remediation: 'Set "attribution": {"commit": "", "pr": ""} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.settings_attribution_commit != ""
        f := {
          "rule_id": "CLD026",
          "evidence": sprintf("attribution.commit is %s, expected \"\"", [input.settings_attribution_commit]),
        }
      }
      findings contains f if {
        input.installed
        input.settings_present
        input.settings_attribution_pr != ""
        f := {
          "rule_id": "CLD026",
          "evidence": sprintf("attribution.pr is %s, expected \"\"", [input.settings_attribution_pr]),
        }
      }
  - id: CLD027
    title: Claude Code respectGitignore is not enabled in settings.json
    severity: warn
    category: claude
    description: |
      respectGitignore=true makes Claude Code honour .gitignore when
      reading files, so ignored files (often containing credentials,
      build outputs, or large vendored data) are not pulled into the
      conversation. Without it, ignored files can be read and may
      end up in transcripts or transmitted context.
    remediation: 'Set "respectGitignore": true in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.settings_respect_gitignore != "true"
        f := {
          "rule_id": "CLD027",
          "evidence": sprintf("respectGitignore is %s, expected true", [input.settings_respect_gitignore]),
        }
      }
  - id: CLD028
    title: Claude Code skipWebFetchPreflight is not enabled in settings.json
    severity: warn
    category: claude
    description: |
      skipWebFetchPreflight=true skips the OPTIONS preflight that
      Claude Code performs before WebFetch, removing an extra
      outbound request per fetch and avoiding leaking working-host
      identification metadata to targets that did not need it.
    remediation: 'Set "skipWebFetchPreflight": true in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.settings_skip_web_fetch_preflight != "true"
        f := {
          "rule_id": "CLD028",
          "evidence": sprintf("skipWebFetchPreflight is %s, expected true", [input.settings_skip_web_fetch_preflight]),
        }
      }
  - id: CLD029
    title: Claude Code autoMemoryDirectory is not set to ".claude/memory" in settings.json
    severity: warn
    category: claude
    description: |
      autoMemoryDirectory pins Claude Code's automatic memory store
      to a known location inside the project. Setting it to
      ".claude/memory" keeps memory files alongside the rest of the
      .claude directory so they can be reviewed, gitignored, or
      pruned as a unit.
    remediation: 'Set "autoMemoryDirectory": ".claude/memory" in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.settings_auto_memory_directory != ".claude/memory"
        f := {
          "rule_id": "CLD029",
          "evidence": sprintf("autoMemoryDirectory is %s, expected \".claude/memory\"", [input.settings_auto_memory_directory]),
        }
      }
  - id: CLD030
    title: Claude Code plansDirectory is not set to ".claude/plans" in settings.json
    severity: warn
    category: claude
    description: |
      plansDirectory pins where Claude Code writes implementation
      plans. Setting it to ".claude/plans" keeps plan artefacts
      alongside the rest of the .claude directory so they can be
      reviewed and managed as a unit.
    remediation: 'Set "plansDirectory": ".claude/plans" in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.settings_plans_directory != ".claude/plans"
        f := {
          "rule_id": "CLD030",
          "evidence": sprintf("plansDirectory is %s, expected \".claude/plans\"", [input.settings_plans_directory]),
        }
      }
  - id: CLD031
    title: Claude Code sandbox.enabled is not true in settings.json
    severity: warn
    category: claude
    description: |
      sandbox.enabled=true turns on the platform sandbox that
      isolates tool execution from the rest of the system. Without
      it, Bash and other tool calls run with the user's full
      permissions and have no enforced filesystem or network limits.
    remediation: 'Set "sandbox": {"enabled": true, ...} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.sandbox_enabled != "true"
        f := {
          "rule_id": "CLD031",
          "evidence": sprintf("sandbox.enabled is %s, expected true", [input.sandbox_enabled]),
        }
      }
  - id: CLD032
    title: Claude Code sandbox.autoAllowBashIfSandboxed is not false in settings.json
    severity: warn
    category: claude
    description: |
      sandbox.autoAllowBashIfSandboxed=false keeps Bash calls in the
      explicit-permission flow even when the sandbox is active. With
      it set to true, Bash invocations are auto-approved when
      sandboxed, removing per-command user oversight.
    remediation: 'Set "sandbox": {"autoAllowBashIfSandboxed": false, ...} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.sandbox_auto_allow_bash_if_sandboxed != "false"
        f := {
          "rule_id": "CLD032",
          "evidence": sprintf("sandbox.autoAllowBashIfSandboxed is %s, expected false", [input.sandbox_auto_allow_bash_if_sandboxed]),
        }
      }
  - id: CLD033
    title: Claude Code sandbox.allowUnsandboxedCommands is not false in settings.json
    severity: warn
    category: claude
    description: |
      sandbox.allowUnsandboxedCommands=false prevents tool calls
      from running outside the sandbox. With it set to true, the
      assistant can request unsandboxed execution and the isolation
      boundary becomes optional rather than enforced.
    remediation: 'Set "sandbox": {"allowUnsandboxedCommands": false, ...} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.sandbox_allow_unsandboxed_commands != "false"
        f := {
          "rule_id": "CLD033",
          "evidence": sprintf("sandbox.allowUnsandboxedCommands is %s, expected false", [input.sandbox_allow_unsandboxed_commands]),
        }
      }
  - id: CLD034
    title: Claude Code sandbox.network.allowManagedDomainsOnly is not true in settings.json
    severity: warn
    category: claude
    description: |
      sandbox.network.allowManagedDomainsOnly=true restricts outbound
      network calls to the explicitly allowed domain list. Without
      it, the sandboxed session can reach arbitrary hosts, defeating
      the point of the allowlist.
    remediation: 'Set "sandbox": {"network": {"allowManagedDomainsOnly": true, ...}} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.sandbox_network_allow_managed_domains_only != "true"
        f := {
          "rule_id": "CLD034",
          "evidence": sprintf("sandbox.network.allowManagedDomainsOnly is %s, expected true", [input.sandbox_network_allow_managed_domains_only]),
        }
      }
  - id: CLD035
    title: Claude Code sandbox.network.allowedDomains does not include "github.com"
    severity: warn
    category: claude
    description: |
      "github.com" should be in sandbox.network.allowedDomains so
      tools that legitimately need GitHub access (clone, gh, API
      calls) can succeed under the network allowlist. Other entries
      are fine; this rule only checks for the presence of github.com.
    remediation: 'Add "github.com" to sandbox.network.allowedDomains in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.sandbox_network_allowed_domains_has_github != "true"
        f := {
          "rule_id": "CLD035",
          "evidence": "sandbox.network.allowedDomains is missing \"github.com\"",
        }
      }
  - id: CLD036
    title: Claude Code sandbox.network.deniedDomains does not include "uploads.github.com"
    severity: warn
    category: claude
    description: |
      "uploads.github.com" should be in sandbox.network.deniedDomains
      so the allowlist for github.com does not implicitly grant
      upload access. Blocking the upload subdomain prevents writing
      data out via large-file or attachment endpoints.
    remediation: 'Add "uploads.github.com" to sandbox.network.deniedDomains in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.sandbox_network_denied_domains_has_uploads_github != "true"
        f := {
          "rule_id": "CLD036",
          "evidence": "sandbox.network.deniedDomains is missing \"uploads.github.com\"",
        }
      }
  - id: CLD037
    title: Claude Code sandbox.filesystem.allowWrite does not include "~/.cache/npm/logs"
    severity: warn
    category: claude
    description: |
      "~/.cache/npm/logs" should be in sandbox.filesystem.allowWrite
      so npm operations under the sandbox can record their logs in
      the standard location. Without it, npm-driven tool calls fail
      to write logs and may error spuriously.
    remediation: 'Add "~/.cache/npm/logs" to sandbox.filesystem.allowWrite in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.sandbox_filesystem_allow_write_has_npm_logs != "true"
        f := {
          "rule_id": "CLD037",
          "evidence": "sandbox.filesystem.allowWrite is missing \"~/.cache/npm/logs\"",
        }
      }
  - id: CLD038
    title: Claude Code sandbox.filesystem.allowWrite does not include "~/.config/claude/debug"
    severity: warn
    category: claude
    description: |
      "~/.config/claude/debug" should be in sandbox.filesystem.allowWrite
      so Claude Code can write its own debug artefacts under the
      sandbox. Without it, debug logs cannot be persisted, making
      diagnostics harder.
    remediation: 'Add "~/.config/claude/debug" to sandbox.filesystem.allowWrite in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.sandbox_filesystem_allow_write_has_claude_debug != "true"
        f := {
          "rule_id": "CLD038",
          "evidence": "sandbox.filesystem.allowWrite is missing \"~/.config/claude/debug\"",
        }
      }
  - id: CLD039
    title: Claude Code permissions.disableBypassPermissionsMode is not "disable" in settings.json
    severity: high
    category: claude
    description: |
      permissions.disableBypassPermissionsMode="disable" prevents Claude
      Code from entering bypass mode, which otherwise turns off the
      permission-prompt flow and lets tool calls run without user
      confirmation. Disabling the bypass mode forces every privileged
      action through the normal allow/deny review.
    remediation: 'Set "permissions": {"disableBypassPermissionsMode": "disable"} in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json)'
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.permissions_disable_bypass_mode != "disable"
        f := {
          "rule_id": "CLD039",
          "evidence": sprintf("permissions.disableBypassPermissionsMode is %s, expected \"disable\"", [input.permissions_disable_bypass_mode]),
        }
      }
  - id: CLD040
    title: Claude Code permissions.deny missing network/exfiltration tool blocks
    severity: high
    category: claude
    description: |
      permissions.deny should block network/exfiltration binaries that
      Claude Code does not need: nc, netcat, socat, ssh, scp, rsync.
      These tools can be used to move data off-host or open inbound
      connections from a sandbox-escaped tool call. Blocking them at
      the permissions layer keeps the assistant's network surface to
      sanctioned channels (WebFetch, gh, etc.).
    remediation: |-
      Add the following to permissions.deny in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json):
              • "Bash(nc:*)"
              • "Bash(netcat:*)"
              • "Bash(socat:*)"
              • "Bash(ssh:*)"
              • "Bash(scp:*)"
              • "Bash(rsync:*)"
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.permissions_deny_network_missing != ""
        f := {
          "rule_id": "CLD040",
          "evidence": sprintf("permissions.deny missing network/exfiltration entries:\n        • %s", [concat("\n        • ", split(input.permissions_deny_network_missing, " "))]),
        }
      }
  - id: CLD041
    title: Claude Code permissions.deny missing destructive filesystem command blocks
    severity: high
    category: claude
    description: |
      permissions.deny should block destructive filesystem commands so
      Claude Code cannot wipe or relax permissions on host data:
      "chmod 777" (over-permissive), "chown" (ownership changes),
      "rm -rf /" and "rm -rf ~" (mass deletion), "dd" (raw block
      writes), and "mkfs" (filesystem creation). Blocking at the
      permissions layer prevents an inadvertent (or prompt-injected)
      tool call from causing irreversible damage.
    remediation: |-
      Add the following to permissions.deny in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json):
              • "Bash(chmod 777:*)"
              • "Bash(chown:*)"
              • "Bash(rm -rf /:*)"
              • "Bash(rm -rf ~:*)"
              • "Bash(dd:*)"
              • "Bash(mkfs:*)"
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.permissions_deny_destructive_fs_missing != ""
        f := {
          "rule_id": "CLD041",
          "evidence": sprintf("permissions.deny missing destructive filesystem entries:\n        • %s", [concat("\n        • ", split(input.permissions_deny_destructive_fs_missing, " "))]),
        }
      }
  - id: CLD042
    title: Claude Code permissions.deny missing destructive git command blocks
    severity: warn
    category: claude
    description: |
      permissions.deny should block git commands that publish history
      or rewrite local state without explicit user confirmation:
      "git push" (publishes commits remotely), "git tag" (publishes
      release markers), "git reset --hard" (discards uncommitted
      work). Blocking forces the user to invoke these out-of-band
      rather than from inside an autonomous tool call.
    remediation: |-
      Add the following to permissions.deny in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json):
              • "Bash(git push:*)"
              • "Bash(git tag:*)"
              • "Bash(git reset --hard:*)"
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.permissions_deny_git_missing != ""
        f := {
          "rule_id": "CLD042",
          "evidence": sprintf("permissions.deny missing destructive git entries:\n        • %s", [concat("\n        • ", split(input.permissions_deny_git_missing, " "))]),
        }
      }
  - id: CLD043
    title: Claude Code permissions.deny missing home credential directory blocks
    severity: high
    category: claude
    description: |
      permissions.deny should block reads of home directories that
      hold long-lived credentials: ~/.ssh (private keys), ~/.aws
      (IAM access keys), ~/.gnupg (PGP keys), ~/.config/gh (GitHub
      CLI tokens), ~/.kube (cluster credentials), ~/.docker/config.json
      (registry tokens). Blocking at the permissions layer keeps
      credential material out of transcripts even if a tool call
      attempts to read it.
    remediation: |-
      Add the following to permissions.deny in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json):
              • "Read(~/.ssh/**)"
              • "Read(~/.aws/**)"
              • "Read(~/.gnupg/**)"
              • "Read(~/.config/gh/**)"
              • "Read(~/.kube/**)"
              • "Read(~/.docker/config.json)"
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.permissions_deny_home_secrets_missing != ""
        f := {
          "rule_id": "CLD043",
          "evidence": sprintf("permissions.deny missing home credential entries:\n        • %s", [concat("\n        • ", split(input.permissions_deny_home_secrets_missing, " "))]),
        }
      }
  - id: CLD044
    title: Claude Code permissions.deny missing project secret file blocks
    severity: high
    category: claude
    description: |
      permissions.deny should block reads of project-local secret
      files: .env files (env-style secrets), *.pem and *.key files
      (private keys/certs), id_rsa* and id_ed25519* (SSH keys
      checked into a project), and credentials* (generic credential
      filenames). Both top-level and recursive (** glob) patterns
      should be present so secrets in nested directories cannot be
      read either.
    remediation: |-
      Add the following to permissions.deny in ~/.claude/settings.json (or $CLAUDE_CONFIG_DIR/settings.json):
              • "Read(./.env)"
              • "Read(./.env.*)"
              • "Read(./*.pem)"
              • "Read(./*.key)"
              • "Read(./**/.env)"
              • "Read(./**/.env.*)"
              • "Read(./**/*.pem)"
              • "Read(./**/*.key)"
              • "Read(./**/id_rsa*)"
              • "Read(./**/id_ed25519*)"
              • "Read(./**/credentials*)"
    policy: |
      findings contains f if {
        input.installed
        input.settings_present
        input.permissions_deny_project_secrets_missing != ""
        f := {
          "rule_id": "CLD044",
          "evidence": sprintf("permissions.deny missing project secret entries:\n        • %s", [concat("\n        • ", split(input.permissions_deny_project_secrets_missing, " "))]),
        }
      }
