rules:
  - id: ENV001
    title: Sensitive credentials found in environment variables
    severity: high
    category: env
    description: |
      Environment variables containing secrets or credentials were
      detected. Secrets in env vars can leak via process listings,
      crash dumps, or child processes.
    remediation: "Use a secrets manager or .env file with restricted permissions instead of shell exports"
    policy: |
      findings contains f if {
        var := input.suspicious_vars[_]
        f := {
          "rule_id": "ENV001",
          "evidence": sprintf("Suspicious env var: %s (matched pattern: %s)", [var.name, var.pattern]),
        }
      }
