rules:
  - id: CRD001
    title: AWS credentials file has weak permissions
    severity: high
    category: credentials
    description: |
      The AWS credentials file (~/.aws/credentials) contains access
      keys that grant access to cloud resources. It should only be
      readable by the owner (mode 0600).
    remediation: "Run: chmod 600 ~/.aws/credentials"
    policy: |
      findings contains f if {
        input.aws_exists
        input.aws_mode != "0600"
        f := {
          "rule_id": "CRD001",
          "evidence": sprintf("~/.aws/credentials has mode %s (expected 0600)", [input.aws_mode]),
        }
      }
  - id: CRD002
    title: .netrc file has weak permissions
    severity: high
    category: credentials
    description: |
      The .netrc file stores login credentials for remote machines
      in plaintext. It should only be readable by the owner
      (mode 0600).
    remediation: "Run: chmod 600 ~/.netrc"
    policy: |
      findings contains f if {
        input.netrc_exists
        input.netrc_mode != "0600"
        f := {
          "rule_id": "CRD002",
          "evidence": sprintf("~/.netrc has mode %s (expected 0600)", [input.netrc_mode]),
        }
      }
  - id: CRD003
    title: GCP credentials file has weak permissions
    severity: high
    category: credentials
    description: |
      The GCP application default credentials file contains tokens
      that grant access to Google Cloud resources. It should only
      be readable by the owner (mode 0600).
    remediation: "Run: chmod 600 ~/.config/gcloud/application_default_credentials.json"
    policy: |
      findings contains f if {
        input.gcp_exists
        input.gcp_mode != "0600"
        f := {
          "rule_id": "CRD003",
          "evidence": sprintf("GCP credentials file has mode %s (expected 0600)", [input.gcp_mode]),
        }
      }
  - id: CRD004
    title: .npmrc with auth token has weak permissions
    severity: high
    category: credentials
    description: |
      The .npmrc file contains an npm authentication token that
      grants publish access to packages. It should only be readable
      by the owner (mode 0600).
    remediation: "Run: chmod 600 ~/.npmrc"
    policy: |
      findings contains f if {
        input.npmrc_has_token
        input.npmrc_mode != "0600"
        f := {
          "rule_id": "CRD004",
          "evidence": sprintf("~/.npmrc contains auth token and has mode %s (expected 0600)", [input.npmrc_mode]),
        }
      }
