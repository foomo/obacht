input: |
  #!/bin/sh
  # Check if docker is installed.
  if ! command -v docker >/dev/null 2>&1; then
    printf '{"installed": false, "socket_exists": false, "socket_mode": "", "user_in_group": false}'
    exit 0
  fi

  socket="/var/run/docker.sock"
  socket_exists=false
  socket_mode=""

  if [ -e "$socket" ]; then
    # Resolve symlinks.
    real_socket=$(readlink -f "$socket" 2>/dev/null || echo "$socket")
    socket_exists=true
    socket_mode=$(stat -f '%04Lp' "$real_socket" 2>/dev/null || stat -c '%04a' "$real_socket" 2>/dev/null || echo "")
  fi

  # Check if current user is in the docker group.
  user_in_group=false
  if id -nG 2>/dev/null | tr ' ' '\n' | grep -qx docker; then
    user_in_group=true
  fi

  printf '{"installed": true, "socket_exists": %s, "socket_mode": "%s", "user_in_group": %s}' \
    "$socket_exists" "$socket_mode" "$user_in_group"

policy: |
  package bouncer.docker

  import rego.v1

  findings contains f if {
    input.socket_exists
    mode := input.socket_mode
    mode != "0660"
    mode != "0600"
    mode != "0700"
    f := {
      "rule_id": "DOC001",
      "evidence": sprintf("Docker socket has mode %s (expected 0660 or stricter)", [mode]),
    }
  }

  findings contains f if {
    input.user_in_group
    f := {
      "rule_id": "DOC002",
      "evidence": "Current user is a member of the docker group",
    }
  }

rules:
  - id: DOC001
    title: Docker socket has overly permissive access
    severity: high
    category: docker
    description: |
      The Docker socket grants full control over the Docker daemon.
      World-readable or world-writable permissions allow any user
      on the system to manage containers and access volumes.
    remediation: "Run: sudo chmod 660 /var/run/docker.sock"
  - id: DOC002
    title: User is in the docker group
    severity: warn
    category: docker
    description: |
      Membership in the docker group grants root-equivalent access
      to the Docker daemon. Consider using rootless Docker or
      requiring sudo for Docker commands.
    remediation: "See: https://docs.docker.com/engine/security/rootless/"
