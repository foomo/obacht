input: |
  #!/bin/sh
  dirs="["
  first=true

  IFS=':'
  for entry in $PATH; do
    [ -z "$entry" ] && continue

    is_relative=false
    case "$entry" in
      /*) ;;
      *) is_relative=true ;;
    esac

    exists=false
    writable=false
    if [ -d "$entry" ]; then
      exists=true
      # Test writability by attempting to create a temp file.
      tmpfile=$(mktemp "$entry/.bouncer-check-XXXXXX" 2>/dev/null) && {
        writable=true
        rm -f "$tmpfile"
      }
    fi

    if [ "$first" = true ]; then first=false; else dirs="$dirs,"; fi
    dirs="$dirs{\"path\":\"$entry\",\"exists\":$exists,\"writable\":$writable,\"is_relative\":$is_relative}"
  done

  dirs="$dirs]"
  printf '{"dirs": %s}' "$dirs"

policy: |
  package bouncer.path

  import rego.v1

  findings contains f if {
    dir := input.dirs[_]
    dir.exists
    dir.writable
    f := {
      "rule_id": "PTH001",
      "evidence": sprintf("Writable directory in PATH: %s", [dir.path]),
    }
  }

  findings contains f if {
    dir := input.dirs[_]
    dir.is_relative
    f := {
      "rule_id": "PTH002",
      "evidence": sprintf("Relative path in PATH: %s", [dir.path]),
    }
  }

rules:
  - id: PTH001
    title: World-writable directory in PATH
    severity: high
    category: path
    description: |
      A directory in your PATH is writable by the current user
      (and potentially others). An attacker could place malicious
      executables in this directory to hijack commands.
    remediation: "Remove the writable directory from PATH or fix its permissions"
  - id: PTH002
    title: Relative path entry in PATH
    severity: warn
    category: path
    description: |
      A relative path in PATH (e.g., '.') causes command resolution
      to depend on the current working directory. An attacker could
      exploit this by placing malicious executables in commonly
      visited directories.
    remediation: "Remove relative paths from PATH and use absolute paths instead"
