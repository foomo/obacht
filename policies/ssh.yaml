input: |
  #!/bin/sh
  set -e
  home="$HOME"
  ssh_dir="$home/.ssh"

  # Check if ~/.ssh exists.
  if [ ! -d "$ssh_dir" ]; then
    printf '{"directory_exists": false, "directory_mode": "", "keys": [], "config_exists": false}'
    exit 0
  fi

  # Resolve symlinks.
  ssh_dir=$(cd "$ssh_dir" && pwd -P)

  dir_mode=$(stat -f '%Lp' "$ssh_dir" 2>/dev/null || stat -c '%a' "$ssh_dir" 2>/dev/null || echo "")

  # Discover private keys.
  keys="[]"
  first=true
  key_json="["
  for f in "$ssh_dir"/id_*; do
    [ -e "$f" ] || continue
    case "$f" in *.pub) continue;; esac
    mode=$(stat -f '%Lp' "$f" 2>/dev/null || stat -c '%a' "$f" 2>/dev/null || echo "")
    type=$(basename "$f" | sed 's/^id_//')
    if [ "$first" = true ]; then
      first=false
    else
      key_json="$key_json,"
    fi
    key_json="$key_json{\"path\":\"$f\",\"mode\":\"0$mode\",\"type\":\"$type\"}"
  done
  key_json="$key_json]"

  config_exists=false
  [ -f "$ssh_dir/config" ] && config_exists=true

  printf '{"directory_exists": true, "directory_mode": "0%s", "keys": %s, "config_exists": %s}' \
    "$dir_mode" "$key_json" "$config_exists"

policy: |
  package bouncer.ssh

  import rego.v1

  findings contains f if {
    key := input.keys[_]
    key.mode != "0600"
    f := {
      "rule_id": "SSH001",
      "evidence": sprintf("Key %s has mode %s (expected 0600)", [key.path, key.mode]),
    }
  }

  findings contains f if {
    input.directory_exists
    input.directory_mode != "0700"
    f := {
      "rule_id": "SSH002",
      "evidence": sprintf("~/.ssh has mode %s (expected 0700)", [input.directory_mode]),
    }
  }

rules:
  - id: SSH001
    title: SSH private key has weak permissions
    severity: high
    category: ssh
    description: |
      SSH private keys should be readable only by the owner.
      Keys with permissions wider than 0600 can be read by
      other users on the system.
    remediation: "Run: chmod 600 ~/.ssh/id_*"
  - id: SSH002
    title: SSH directory has weak permissions
    severity: high
    category: ssh
    description: |
      The ~/.ssh directory should only be accessible by the owner.
      Permissions wider than 0700 may allow other users to read
      or modify SSH configuration and keys.
    remediation: "Run: chmod 700 ~/.ssh"
