input: |
  #!/bin/sh
  # Scan environment variables for suspicious patterns.
  # NEVER outputs values, only variable names and matched patterns.

  exact_matches="AWS_SECRET_ACCESS_KEY AWS_ACCESS_KEY_ID GITHUB_TOKEN GITLAB_TOKEN NPM_TOKEN DOCKER_PASSWORD SLACK_TOKEN SLACK_WEBHOOK_URL DATABASE_URL MYSQL_PASSWORD POSTGRES_PASSWORD REDIS_URL"
  suffix_patterns="_PASSWORD _SECRET_KEY _API_KEY _PRIVATE_KEY"

  suspicious="["
  first=true

  env | while IFS='=' read -r name rest; do
    matched=""
    pattern=""

    # Check exact matches.
    for exact in $exact_matches; do
      if [ "$name" = "$exact" ]; then
        matched="$name"
        pattern="exact:$exact"
        break
      fi
    done

    # Check suffix patterns.
    if [ -z "$matched" ]; then
      for suffix in $suffix_patterns; do
        case "$name" in
          *"$suffix")
            matched="$name"
            pattern="*$suffix"
            break
            ;;
        esac
      done
    fi

    if [ -n "$matched" ]; then
      if [ "$first" = true ]; then
        first=false
      else
        printf ','
      fi
      printf '{"name":"%s","pattern":"%s"}' "$matched" "$pattern"
    fi
  done | {
    items=$(cat)
    printf '{"suspicious_vars": [%s]}' "$items"
  }

rules:
  - id: ENV001
    title: Sensitive credentials found in environment variables
    severity: high
    category: env
    description: |
      Environment variables containing secrets or credentials were
      detected. Secrets in env vars can leak via process listings,
      crash dumps, or child processes.
    remediation: "Use a secrets manager or .env file with restricted permissions instead of shell exports"
    policy: |
      findings contains f if {
        var := input.suspicious_vars[_]
        f := {
          "rule_id": "ENV001",
          "evidence": sprintf("Suspicious env var: %s (matched pattern: %s)", [var.name, var.pattern]),
        }
      }
