input: |
  #!/bin/sh
  tools="["
  first=true

  for tool in git opa gpg ssh-agent; do
    installed=false
    version=""
    path=""

    tool_path=$(command -v "$tool" 2>/dev/null || true)
    if [ -n "$tool_path" ]; then
      installed=true
      path="$tool_path"
      case "$tool" in
        git)       version=$(git --version 2>/dev/null | head -1) ;;
        opa)       version=$(opa version 2>/dev/null | head -1) ;;
        gpg)       version=$(gpg --version 2>/dev/null | head -1) ;;
        ssh-agent) version=$(ssh-agent -V 2>&1 | head -1) ;;
      esac
    fi

    if [ "$first" = true ]; then first=false; else tools="$tools,"; fi
    tools="$tools{\"name\":\"$tool\",\"installed\":$installed,\"version\":\"$version\",\"path\":\"$path\"}"
  done

  tools="$tools]"
  printf '{"tools": %s}' "$tools"

rules:
  - id: TOL001
    title: Security-relevant tool is missing
    severity: info
    category: tools
    description: |
      Some security tools are recommended for a secure development
      environment. Missing tools may indicate gaps in your security
      workflow.
    remediation: "Install missing tools via your package manager"
    policy: |
      findings contains f if {
        tool := input.tools[_]
        not tool.installed
        f := {
          "rule_id": "TOL001",
          "evidence": sprintf("Tool '%s' is not installed", [tool.name]),
        }
      }
